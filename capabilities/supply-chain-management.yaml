naftiko: 1.0.0-alpha2
info:
  label: U.S. Steel Supply Chain Management
  description: Workflow capability for managing the complete U.S. Steel supply chain relationship. Combines order management,
    inventory tracking, shipment visibility, and quality documentation from the SteelTrack platform. Designed for procurement
    managers, supply chain analysts, and automotive supplier quality engineers who need integrated visibility into steel orders
    from placement through delivery and quality certification.
  tags:
  - U.S. Steel
  - Supply Chain
  - Procurement
  - Quality
  - Manufacturing
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    USSTEEL_BEARER_TOKEN: USSTEEL_BEARER_TOKEN
capability:
  consumes:
  - type: http
    namespace: ussteel-steeltrack
    baseUri: https://steeltrack.ussteel.com/api
    description: U.S. Steel SteelTrack customer platform API.
    authentication:
      type: bearer
      token: '{{USSTEEL_BEARER_TOKEN}}'
    resources:
    - name: orders
      path: /orders
      description: Steel order management.
      operations:
      - name: list-orders
        method: GET
        description: List orders with optional filters.
        inputParameters:
        - name: status
          in: query
          type: string
          required: false
          description: Filter by order status.
        - name: customerId
          in: query
          type: string
          required: false
          description: Filter by customer ID.
        - name: limit
          in: query
          type: integer
          required: false
          description: Max results.
        - name: offset
          in: query
          type: integer
          required: false
          description: Pagination offset.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-order
        method: GET
        description: Get order details by order ID.
        inputParameters:
        - name: orderId
          in: path
          type: string
          required: true
          description: Order identifier.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: inventory
      path: /inventory
      description: Customer inventory tracking.
      operations:
      - name: list-inventory
        method: GET
        description: List available inventory items.
        inputParameters:
        - name: customerId
          in: query
          type: string
          required: false
          description: Filter by customer ID.
        - name: product
          in: query
          type: string
          required: false
          description: Filter by product type.
        - name: grade
          in: query
          type: string
          required: false
          description: Filter by steel grade.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: shipments
      path: /shipments
      description: Shipment history and tracking.
      operations:
      - name: list-shipments
        method: GET
        description: List shipment history.
        inputParameters:
        - name: orderId
          in: query
          type: string
          required: false
          description: Filter by order ID.
        - name: purchaseOrder
          in: query
          type: string
          required: false
          description: Filter by purchase order.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: test-reports
      path: /test-reports
      description: Steel product test reports.
      operations:
      - name: list-test-reports
        method: GET
        description: List test reports for steel products.
        inputParameters:
        - name: coilId
          in: query
          type: string
          required: false
          description: Filter by coil ID.
        - name: orderId
          in: query
          type: string
          required: false
          description: Filter by order ID.
        - name: reportType
          in: query
          type: string
          required: false
          description: Filter by report type.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: ussteel-supply-chain-api
    description: Unified REST API for U.S. Steel supply chain management.
    resources:
    - path: /v1/orders
      name: orders
      description: Steel order management and status tracking.
      operations:
      - method: GET
        name: list-orders
        description: List orders.
        call: ussteel-steeltrack.list-orders
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderId}
      name: order-detail
      description: Get order details.
      operations:
      - method: GET
        name: get-order
        description: Get order by ID.
        call: ussteel-steeltrack.get-order
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/inventory
      name: inventory
      description: Available inventory tracking.
      operations:
      - method: GET
        name: list-inventory
        description: List available inventory.
        call: ussteel-steeltrack.list-inventory
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/shipments
      name: shipments
      description: Shipment history and tracking.
      operations:
      - method: GET
        name: list-shipments
        description: List shipments.
        call: ussteel-steeltrack.list-shipments
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/test-reports
      name: test-reports
      description: Quality test reports.
      operations:
      - method: GET
        name: list-test-reports
        description: List test reports.
        call: ussteel-steeltrack.list-test-reports
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: ussteel-supply-chain-mcp
    transport: http
    description: MCP server for AI-assisted U.S. Steel supply chain management.
    tools:
    - name: list-steel-orders
      description: List U.S. Steel orders with filtering by status, facility, and date range.
      hints:
        readOnly: true
        openWorld: true
      call: ussteel-steeltrack.list-orders
      outputParameters:
      - type: object
        mapping: $.
    - name: get-steel-order
      description: Get detailed information for a specific U.S. Steel order including production status and delivery timeline.
      hints:
        readOnly: true
        openWorld: true
      call: ussteel-steeltrack.get-order
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
    - name: list-steel-inventory
      description: List available U.S. Steel customer inventory by product type, grade, and facility.
      hints:
        readOnly: true
        openWorld: true
      call: ussteel-steeltrack.list-inventory
      outputParameters:
      - type: object
        mapping: $.
    - name: list-steel-shipments
      description: List U.S. Steel shipment history for orders and purchase orders with coil-level detail.
      hints:
        readOnly: true
        openWorld: true
      call: ussteel-steeltrack.list-shipments
      outputParameters:
      - type: object
        mapping: $.
    - name: list-test-reports
      description: List certified physical, mechanical, and chemical test reports for steel products by coil or order.
      hints:
        readOnly: true
        openWorld: true
      call: ussteel-steeltrack.list-test-reports
      outputParameters:
      - type: object
        mapping: $.
