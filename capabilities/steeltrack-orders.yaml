naftiko: 1.0.0-alpha2
info:
  label: U.S. Steel SteelTrack API — Orders
  description: 'U.S. Steel SteelTrack API — Orders. 2 operations. Lead operation: U.S. Steel SteelTrack List Orders. Self-contained
    Naftiko capability covering one United States Steel business surface.'
  tags:
  - United States Steel
  - Orders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITED_STATES_STEEL_API_KEY: UNITED_STATES_STEEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: steeltrack-orders
    baseUri: https://steeltrack.ussteel.com/api
    description: U.S. Steel SteelTrack API — Orders business capability. Self-contained, no shared references.
    resources:
    - name: orders
      path: /orders
      operations:
      - name: listorders
        method: GET
        description: U.S. Steel SteelTrack List Orders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: facility
          in: query
          type: string
          description: Filter by production facility code.
        - name: status
          in: query
          type: string
          description: Filter by order status.
        - name: customerId
          in: query
          type: string
          description: Filter by customer ID.
        - name: fromDate
          in: query
          type: string
          description: Start date for order date range filter (YYYY-MM-DD).
        - name: toDate
          in: query
          type: string
          description: End date for order date range filter (YYYY-MM-DD).
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return.
        - name: offset
          in: query
          type: integer
          description: Number of results to skip for pagination.
    - name: orders-orderId
      path: /orders/{orderId}
      operations:
      - name: getorder
        method: GET
        description: U.S. Steel SteelTrack Get Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: orderId
          in: path
          type: string
          description: The unique order identifier.
          required: true
    authentication:
      type: bearer
      token: '{{env.UNITED_STATES_STEEL_API_KEY}}'
  exposes:
  - type: rest
    namespace: steeltrack-orders-rest
    port: 8080
    description: REST adapter for U.S. Steel SteelTrack API — Orders. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orders
      name: orders
      description: REST surface for orders.
      operations:
      - method: GET
        name: listorders
        description: U.S. Steel SteelTrack List Orders
        call: steeltrack-orders.listorders
        with:
          facility: rest.facility
          status: rest.status
          customerId: rest.customerId
          fromDate: rest.fromDate
          toDate: rest.toDate
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/{orderid}
      name: orders-orderid
      description: REST surface for orders-orderId.
      operations:
      - method: GET
        name: getorder
        description: U.S. Steel SteelTrack Get Order
        call: steeltrack-orders.getorder
        with:
          orderId: rest.orderId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: steeltrack-orders-mcp
    port: 9090
    transport: http
    description: MCP adapter for U.S. Steel SteelTrack API — Orders. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: u-s-steel-steeltrack-list-orders
      description: U.S. Steel SteelTrack List Orders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: steeltrack-orders.listorders
      with:
        facility: tools.facility
        status: tools.status
        customerId: tools.customerId
        fromDate: tools.fromDate
        toDate: tools.toDate
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
    - name: u-s-steel-steeltrack-get-order
      description: U.S. Steel SteelTrack Get Order
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: steeltrack-orders.getorder
      with:
        orderId: tools.orderId
      outputParameters:
      - type: object
        mapping: $.
