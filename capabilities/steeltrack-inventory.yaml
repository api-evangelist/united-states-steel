naftiko: 1.0.0-alpha2
info:
  label: U.S. Steel SteelTrack API — Inventory
  description: 'U.S. Steel SteelTrack API — Inventory. 1 operations. Lead operation: U.S. Steel SteelTrack List Inventory.
    Self-contained Naftiko capability covering one United States Steel business surface.'
  tags:
  - United States Steel
  - Inventory
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    UNITED_STATES_STEEL_API_KEY: UNITED_STATES_STEEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: steeltrack-inventory
    baseUri: https://steeltrack.ussteel.com/api
    description: U.S. Steel SteelTrack API — Inventory business capability. Self-contained, no shared references.
    resources:
    - name: inventory
      path: /inventory
      operations:
      - name: listinventory
        method: GET
        description: U.S. Steel SteelTrack List Inventory
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: customerId
          in: query
          type: string
          description: Filter by customer ID.
        - name: product
          in: query
          type: string
          description: Filter by product type.
        - name: grade
          in: query
          type: string
          description: Filter by steel grade.
        - name: facility
          in: query
          type: string
          description: Filter by production facility.
        - name: limit
          in: query
          type: integer
          description: Maximum number of results to return.
        - name: offset
          in: query
          type: integer
          description: Pagination offset.
    authentication:
      type: bearer
      token: '{{env.UNITED_STATES_STEEL_API_KEY}}'
  exposes:
  - type: rest
    namespace: steeltrack-inventory-rest
    port: 8080
    description: REST adapter for U.S. Steel SteelTrack API — Inventory. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/inventory
      name: inventory
      description: REST surface for inventory.
      operations:
      - method: GET
        name: listinventory
        description: U.S. Steel SteelTrack List Inventory
        call: steeltrack-inventory.listinventory
        with:
          customerId: rest.customerId
          product: rest.product
          grade: rest.grade
          facility: rest.facility
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: steeltrack-inventory-mcp
    port: 9090
    transport: http
    description: MCP adapter for U.S. Steel SteelTrack API — Inventory. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: u-s-steel-steeltrack-list-inventory
      description: U.S. Steel SteelTrack List Inventory
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: steeltrack-inventory.listinventory
      with:
        customerId: tools.customerId
        product: tools.product
        grade: tools.grade
        facility: tools.facility
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
