apis:
  - name: U.S. Steel SteelTrack API
    description: >-
      SteelTrack is U.S. Steel's internet-based customer platform providing order
      status reporting, inventory tracking, shipment history, material release, and
      physical and chemical test reporting. The API enables ERP and supply chain
      integration for steel order management and quality documentation.
