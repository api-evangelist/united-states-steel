aid: united-states-steel
name: United States Steel
url: https://raw.githubusercontent.com/api-evangelist/united-states-steel/refs/heads/main/apis.yml
description: >-
  United States Steel Corporation (U.S. Steel) is an integrated steel producer
  headquartered in Pittsburgh, Pennsylvania, with major production operations in the
  United States and Central Europe. The company serves customers in automotive,
  construction, container, energy, and industrial markets with advanced high-strength
  steels, coated products, hot-rolled and cold-rolled coils, electrical steel, and
  tubular products. U.S. Steel provides digital customer tools through the SteelTrack
  platform for order management, inventory tracking, shipment history, and certified
  test reporting.
